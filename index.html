<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarinha Abelha 🐝</title>
    <style>
        :root { --bg: #fffdf0; --card: #ffffff; --text: #333; --accent: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border: 2px solid var(--accent); }
        .bee-icon { font-size: 50px; margin-bottom: 10px; }
        textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 12px; border: 1px solid #ddd; }
        button { background: var(--accent); border: none; padding: 12px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        #resultado { 
            margin-top: 20px; 
            padding: 20px; 
            font-size: 24px; 
            font-weight: bold; 
            color: #d35400; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="card">
    <div class="bee-icon">🐝O.O</div>
    <h1>Clarinha Abelha</h1>
    <textarea id="userInput" placeholder="Como você está se sentindo?"></textarea>
    <button onclick="buscarLivro()">Encontrar Recomendação</button>

    <div id="resultado">
        E o kiko?😂
    </div>
</div>

<script>
    function buscarLivro() {
        const input = document.getElementById('userInput').value;
        if(input.trim() !== "") {
            document.getElementById('resultado').style.display = 'block';
        } else {
            alert("Escreva algo primeiro!");
        }
    }
</script>

</body>
</html>
