<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Literária - Encontre seu próximo livro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f1ea;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            resize: none;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #34495e;
        }

        button {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #2c3e50;
        }

        .result-container {
            margin-top: 20px;
            text-align: left;
            display: none;
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #e67e22; /* Cor de destaque para indicar busca ao vivo */
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .book-title {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .book-author {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .book-description {
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bússola Literária 🧭</h1>
        <p class="subtitle">Conectado ao Google Books. Conte o seu momento e buscaremos o livro ideal ao vivo.</p>

        <div class="search-box">
            <textarea id="userInput" placeholder="Ex: Estou me sentindo muito ansioso com o futuro profissional... ou Terminei meu namoro e estou triste."></textarea>
            <button id="searchBtn" onclick="buscarLivroNoGoogle()">Consultar Google Books</button>
        </div>

        <div class="result-container" id="resultContainer">
            <h3 style="color: #2c3e50; margin-bottom: 10px;" id="resultStatus">Recomendação encontrada no Google:</h3>
            <div class="book-card">
                <div class="book-title" id="bookTitle">Carregando título...</div>
                <div class="book-author" id="bookAuthor">Carregando autor...</div>
                <div class="book-description" id="bookDescription">Carregando sinopse...</div>
            </div>
        </div>
    </div>

    <!-- Chamando o arquivo externo de lógica -->
    <script src="script.js"></script>
</body>
</html>
