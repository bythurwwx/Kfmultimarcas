<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Literária</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#f4f1ea; display:flex; justify-content:center; min-height:100vh; padding:20px; }
        .container { max-width:600px; width:100%; text-align:center; }
        textarea { width:100%; height:120px; padding:15px; margin:20px 0; border-radius:10px; border:1px solid #ccc; }
        button { background:#34495e; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; width:100%; }
        #resultContainer { margin-top:20px; text-align:left; display:none; padding:20px; background:white; border-left:5px solid #34495e; border-radius:12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bússola Literária 🧭</h1>
        <textarea id="userInput" placeholder="Como você está se sentindo?"></textarea>
        <button onclick="buscarLivro()">Encontrar Recomendação</button>
        <div id="resultContainer">
            <h3 id="bookTitle"></h3>
            <p id="bookAuthor" style="font-style:italic; color:#7f8c8d; margin-bottom:10px;"></p>
            <p id="bookDescription"></p>
        </div>
    </div>

    <script>
        const acervoLivros = [
          { titulo: "O Poder do Agora", autor: "Eckhart Tolle", tags: ["ansiedade", "futuro", "estresse", "medo"], motivo: "Focar no presente." },
          { titulo: "A Sutil Arte de Ligar o F*da-se", autor: "Mark Manson", tags: ["trabalho", "pressao", "desanimado"], motivo: "Desapegar de cobranças." },
          { titulo: "O Pequeno Príncipe", autor: "Antoine de Saint-Exupéry", tags: [], motivo: "Um clássico para acalmar o coração." }
        ];

        function buscarLivro() {
            const input = document.getElementById('userInput').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            let melhor = acervoLivros[acervoLivros.length - 1]; // Padrão: Pequeno Príncipe
            let maxScore = 0;

            acervoLivros.forEach(livro => {
                let score = livro.tags.filter(tag => input.includes(tag)).length;
                if (score > maxScore) { maxScore = score; melhor = livro; }
            });

            document.getElementById('bookTitle').innerText = melhor.titulo;
            document.getElementById('bookAuthor').innerText = "Por " + melhor.autor;
            document.getElementById('bookDescription').innerText = melhor.motivo;
            document.getElementById('resultContainer').style.display = 'block';
        }
    </script>
</body>
</html>
