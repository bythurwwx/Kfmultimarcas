<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Literária - Encontre seu próximo livro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f1ea; /* Cor aconchegante que lembra páginas de livro */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            resize: none;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #34495e;
        }

        button {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #2c3e50;
        }

        .result-container {
            margin-top: 20px;
            text-align: left;
            display: none; /* Fica escondido até o usuário clicar no botão */
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #34495e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .book-title {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .book-author {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .book-description {
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bússola Literária 🧭</h1>
        <p class="subtitle">Desabafe sobre o seu momento atual e nós te indicaremos o livro certo.</p>

        <div class="search-box">
            <textarea id="userInput" placeholder="Ex: Estou me sentindo muito ansioso com o futuro e com o meu trabalho... ou Terminei um relacionamento e preciso superar."></textarea>
            <button onclick="buscarLivro()">Encontrar Recomendação</button>
        </div>

        <div class="result-container" id="resultContainer">
            <h3 style="color: #2c3e50; margin-bottom: 10px;">Nossa recomendação para você:</h3>
            <div class="book-card">
                <div class="book-title" id="bookTitle">Título do Livro</div>
                <div class="book-author" id="bookAuthor">Autor</div>
                <div class="book-description" id="bookDescription">Motivo da indicação...</div>
            </div>
        </div>
    </div>

    <script>
        // Esse é o seu banco de dados de livros. Você pode adicionar mais itens aqui seguindo o mesmo padrão!
        const acervoLivros = [
            {
                titulo: "O Poder do Agora",
                autor: "Eckhart Tolle",
                tags: ["ansiedade", "futuro", "preocupado", "mente", "estresse", "ansiosa", "ansioso", "pensamentos"],
                motivo: "Este livro é perfeito para acalmar a mente e focar no presente. Se você está ansioso com o futuro ou preso a pensamentos repetitivos, ele te ajuda a encontrar clareza e paz."
            },
            {
                titulo: "A Sutil Arte de Ligar o F*da-se",
                autor: "Mark Manson",
                tags: ["trabalho", "pressao", "cobrança", "fracasso", "perdido", "desanimado", "carreira", "pressão"],
                motivo: "Ideal para momentos de crise profissional ou quando você sente que está se cobrando demais. Ele traz uma perspectiva realista sobre aceitar as falhas e focar no que realmente importa."
            },
            {
                titulo: "Mulheres que Correm com os Lobos",
                autor: "Clarissa Pinkola Estés",
                tags: ["termino", "solitude", "autoconhecimento", "identidade", "superar", "mulher", "relacionamento", "término"],
                motivo: "Um clássico sobre o resgate da força interior e intuição feminina. Excelente para quem está passando por términos, divórcios ou momentos de redescoberta pessoal."
            },
            {
                titulo: "O Alquimista",
                autor: "Paulo Coelho",
                tags: ["escolhas", "duvida", "destino", "sonhos", "mudar", "mudança", "desanimada", "desanimado"],
                motivo: "Uma história inspiradora sobre seguir seus sonhos e ouvir seu coração. Ótimo para quando você está em uma encruzilhada na vida e precisa de motivação para continuar."
            },
            {
                titulo: "Essencialismo",
                autor: "Greg McKeown",
                tags: ["cansado", "cansada", "sem tempo", "produtividade", "foco", "rotina", "tarefas", "esgotado"],
                motivo: "Se você sente que está fazendo muita coisa mas não sai do lugar, este livro ensina a eliminar o que é desnecessário para focar apenas no que realmente gera valor na sua vida."
            }
        ];

        function buscarLivro() {
            const textoUsuario = document.getElementById('userInput').value.toLowerCase();
            const resultContainer = document.getElementById('resultContainer');
            
            // Validação simples para o usuário não deixar em branco
            if (!textoUsuario.trim()) {
                alert("Por favor, digite uma frase contando como você está se sentindo!");
                return;
            }

            let livroRecomendado = null;
            let maiorNumeroDeCombinacoes = 0;

            // O algoritmo varre o texto do usuário procurando as tags dos livros
            acervoLivros.forEach(livro => {
                let combinacoes = 0;
                livro.tags.forEach(tag => {
                    if (textoUsuario.includes(tag)) {
                        combinacoes++;
                    }
                });

                // Escolhe o livro que tiver o maior número de palavras-chave combinando
                if (combinacoes > maiorNumeroDeCombinacoes) {
                    maiorNumeroDeCombinacoes = combinacoes;
                    livroRecomendado = livro;
                }
            });

            // Caso o usuário digite algo que não tenha nenhuma tag correspondente
            if (!livroRecomendado) {
                livroRecomendado = {
                    titulo: "O Pequeno Príncipe",
                    autor: "Antoine de Saint-Exupéry",
                    motivo: "Não conseguimos identificar uma dor específica no seu relato, mas 'O Pequeno Príncipe' é uma leitura universal e reconfortante. Ela nos lembra de olhar a vida com mais simplicidade e focar no que realmente é essencial e invisível aos olhos."
                };
            }

            // Altera o conteúdo na página com as informações do livro encontrado
            document.getElementById('bookTitle').innerText = livroRecomendado.titulo;
            document.getElementById('bookAuthor').innerText = "Por " + livroRecomendado.autor;
            document.getElementById('bookDescription').innerText = livroRecomendado.motivo;
            
            // Torna o bloco do resultado visível
            resultContainer.style.display = 'block';
        }
    </script>
</body>
</html>
