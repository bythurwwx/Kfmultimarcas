<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Console de Monitoramento - BD_PROD_2026</title>
    <style>
        body {
            background-color: #0c0f12;
            color: #a9b2c3;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            font-size: 13px;
        }
        .header {
            border-bottom: 1px dashed #343d46;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #4f5b66;
        }
        .container {
            max-width: 600px;
        }
        .log-row {
            margin-bottom: 8px;
            display: flex;
            gap: 5px;
        }
        .char-box {
            width: 35px;
            height: 35px;
            border: 1px solid #343d46;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
            background: #161b22;
        }
        /* Cores disfarçadas de sucesso/erro do sistema */
        .correct {
            background-color: #1b4721 !important; /* Verde escuro (Sucesso) */
            color: #3ade5b;
            border-color: #2ea043 !important;
        }
        .present {
            background-color: #4d3800 !important; /* Amarelo/Laranja escuro (Aviso) */
            color: #ffc107;
            border-color: #ca9b00 !important;
        }
        .absent {
            background-color: #21262d !important; /* Cinza escuro (Ignorado) */
            color: #8b949e;
        }
        input {
            background: #161b22;
            border: 1px solid #343d46;
            color: #58a6ff;
            padding: 8px;
            font-family: inherit;
            width: 180px;
            margin-top: 15px;
            outline: none;
        }
        input:focus {
            border-color: #58a6ff;
        }
        .status-msg {
            color: #8b949e;
            margin-top: 10px;
            font-style: italic;
        }
        .btn-panic {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #21262d;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        SYS_LOG: v4.12.0-RELEASE // Sessão ativa: admin_usr // Host: 192.168.1.104 <br>
        Status do Banco de Dados: <span style="color: #3ade5b;">ESTÁVEL</span> | Query Buffer: OK
    </div>

    <div class="container">
        <p style="color: #8b949e;">[SISTEMA] Insira a chave de criptografia de 5 letras para validar o lote:</p>
        
        <!-- Grid do Jogo (6 tentativas) -->
        <div id="grid"></div>

        <input type="text" id="guessInput" maxlength="5" placeholder="DIGITE AQUI..." autocomplete="off">
        <div class="status-msg" id="message">> Aguardando comando de validação...</div>
    </div>

    <!-- Botão invisível de pânico que te joga pro Google se você clicar correndo -->
    <button class="btn-panic" onclick="window.location.href='https://www.google.com'">.</button>

    <script>
        // Lista de palavras secretas possíveis (todas com 5 letras)
        const words = ["TEMPO", "TERMO", "LOGAR", "DADOS", "CHAVE", "PASTA", "GRUPO", "CAMPO", "INDEX", "FOLHA"];
        const targetWord = words[Math.floor(Math.random() * words.length)];
        
        let attempts = 0;
        const maxAttempts = 6;
        const grid = document.getElementById("grid");
        const input = document.getElementById("guessInput");
        const message = document.getElementById("message");

        // Cria a grade vazia que parece uma tabela de sistema
        for (let i = 0; i < maxAttempts; i++) {
            const row = document.createElement("div");
            row.className = "log-row";
            for (let j = 0; j < 5; j++) {
                const box = document.createElement("div");
                box.className = "char-box";
                box.id = `box-${i}-${j}`;
                box.innerText = "-";
                row.appendChild(box);
            }
            grid.appendChild(row);
        }

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                const guess = input.value.toUpperCase();
                if (guess.length !== 5) {
                    message.innerText = "> ERRO: A chave deve conter exatamente 5 caracteres.";
                    return;
                }
                
                processGuess(guess);
                input.value = "";
            }
        });

        function processGuess(guess) {
            let correctCount = 0;
            
            for (let i = 0; i < 5; i++) {
                const box = document.getElementById(`box-${attempts}-${i}`);
                const char = guess[i];
                box.innerText = char;

                if (targetWord[i] === char) {
                    box.classList.add("correct");
                    correctCount++;
                } else if (targetWord.includes(char)) {
                    box.classList.add("present");
                } else {
                    box.classList.add("absent");
                }
            }

            attempts++;

            if (correctCount === 5) {
                message.innerHTML = `> <span style="color:#3ade5b;">SUCESSO: Chave decodificada! Lote processado.</span>`;
                input.disabled = true;
            } else if (attempts >= maxAttempts) {
                message.innerHTML = `> <span style="color:#f97583;">FALHA: Acesso bloqueado. A chave era ${targetWord}.</span>`;
                input.disabled = true;
            } else {
                message.innerText = `> Tentativa ${attempts}/6 enviada ao servidor...`;
            }
        }
    </script>
</body>
</html>
