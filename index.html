        button { background: #ffc107; color: #856404; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #ffca2c; }
        #resultado { margin-top: 20px; text-align: left; display: none; padding: 15px; border-left: 5px solid #ffc107; background: #fffdf0; border-radius: 0 10px 10px 0; }
    </style>
</head>
<body>

    ];

    document.getElementById('btnBuscar').addEventListener('click', function() {
        const input = document.getElementById('userInput').value.toLowerCase();
        let melhorLivro = null;
        let maiorScore = 0;

        acervoLivros.forEach(livro => {
            let score = 0;
            livro.tags.forEach(tag => {
                if (input.includes(tag)) score++;
            });
            if (score > maiorScore) {
                maiorScore = score;
                melhorLivro = livro;
            }
        });

        if (melhorLivro) {
            document.getElementById('tituloLivro').innerText = melhorLivro.titulo;
            document.getElementById('autorLivro').innerText = "Por " + melhorLivro.autor;
            document.getElementById('motivoLivro').innerText = melhorLivro.motivo;
            document.getElementById('resultado').style.display = 'block';
        } else {
            alert("Clarinha Abelha ainda não encontrou uma recomendação exata, tente descrever mais como você se sente! 🐝");
        }
    });
