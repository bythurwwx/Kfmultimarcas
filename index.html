<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Literária</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f1ea; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        h1 { font-size: 2.5rem; color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 1.1rem; }
        .search-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 1px solid #dcdde1; border-radius: 10px; resize: none; font-size: 1rem; margin-bottom: 15px; outline: none; }
        button { background-color: #34495e; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c3e50; }
        .result-container { margin-top: 20px; text-align: left; display: none; }
        .book-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #34495e; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .book-title { font-size: 1.4rem; color: #2c3e50; margin-bottom: 5px; font-weight: bold; }
        .book-author { font-style: italic; color: #7f8c8d; margin-bottom: 15px; }
        .book-description { line-height: 1.6; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bússola Literária 🧭</h1>
        <p class="subtitle">Desabafe sobre o seu momento atual e nós te indicaremos o livro certo.</p>

        <div class="search-box">
            <textarea id="userInput" placeholder="Ex: Estou desanimado com o meu trabalho ou sem grana para pagar as contas..."></textarea>
            <button onclick="buscarLivro()">Encontrar Recomendação</button>
        </div>

        <div class="result-container" id="resultContainer">
            <h3 style="color: #2c3e50; margin-bottom: 10px;">Nossa recomendação para você:</h3>
            <div class="book-card">
                <div class="book-title" id="bookTitle">Título do Livro</div>
                <div class="book-author" id="bookAuthor">Autor</div>
                <div class="book-description" id="bookDescription">Motivo da indicação...</div>
            </div>
        </div>
    </div>

    <script>
        let acervoLivros = [];

        // Motor que puxa os dados do arquivo JSON externo automaticamente
        window.onload = function() {
            fetch('livros.json')
                .then(response => response.json())
                .then(data => { acervoLivros = data; })
                .catch(err => console.error("Erro ao carregar acervo de livros:", err));
        };

        function buscarLivro() {
            const textoUsuario = document.getElementById('userInput').value.toLowerCase().trim();
            const resultContainer = document.getElementById('resultContainer');
            
            if (!textoUsuario) {
                alert("Por favor, digite uma frase contando como você está se sentindo!");
                return;
            }

            let livroRecomendado = null;
            let maiorNumeroDeCombinacoes = 0;

            acervoLivros.forEach(livro => {
                let combinacoes = 0;
                livro.tags.forEach(tag => {
                    if (textoUsuario.includes(tag)) { combinacoes++; }
                });

                if (combinacoes > maiorNumeroDeCombinacoes) {
                    maiorNumeroDeCombinacoes = combinacoes;
                    livroRecomendado = livro;
                }
            });

            if (livroRecomendado) {
                document.getElementById('bookTitle').innerText = livroRecomendado.titulo;
                document.getElementById('bookAuthor').innerText = "Por " + livroRecomendado.autor;
                document.getElementById('bookDescription').innerText = livroRecomendado.motivo;
            } else {
                document.getElementById('bookTitle').innerText = "O Pequeno Príncipe";
                document.getElementById('bookAuthor').innerText = "Por Antoine de Saint-Exupéry";
                document.getElementById('bookDescription').innerText = "Não encontramos termos específicos no seu desabafo, mas esse clássico acalma o coração em momentos confusos.";
            }
            
            resultContainer.style.display = 'block';
        }
    </script>
</body>
</html>
